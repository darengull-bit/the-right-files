apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentpro-api
  labels:
    app: agentpro
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agentpro
      component: api
  template:
    metadata:
      labels:
        app: agentpro
        component: api
    spec:
      containers:
        - name: nextjs-api
          image: your-registry/agentpro:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: agent-proseo-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20