apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawl-worker
  labels:
    app: crawl-worker
    component: background-worker
spec:
  replicas: 10
  selector:
    matchLabels:
      app: crawl-worker
  template:
    metadata:
      labels:
        app: crawl-worker
    spec:
      containers:
        - name: crawl-worker
          image: agentpro/crawl-worker:latest
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agentpro-secrets
                  key: REDIS_URL
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agentpro-secrets
                  key: GOOGLE_API_KEY
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "process.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 10
